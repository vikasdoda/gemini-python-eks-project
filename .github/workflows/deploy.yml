name: CI/CD GitOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Prepare Environment
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for pushing changes back to Git

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 2. Testing Gate (The "Quality Shield")
      - name: Install Dependencies & Run Tests
        run: |
          pip install -r requirements.txt
          # If you have tests, run them here. If they fail, the pipeline stops.
          # pytest 

      # 3. SonarQube / Security Scan (Job Description Requirement #11)
      - name: SonarQube Scan Placeholder
        run: |
          echo "Running SonarQube Static Analysis..."
          # In a real setup, you'd use the SonarQube Action here

      # 4. AWS Authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build and Push (Continuous Integration)
      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-python-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 6. The GitOps Pivot (Continuous Delivery via ArgoCD)
      - name: Update Helm Chart with New Image Tag
        run: |
          # Configure Git Identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use 'sed' to find the 'tag:' line in your values.yaml and update it to the current SHA
          # This assumes your values.yaml has a line: tag: "something"
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" my-python-chart/values.yaml
          
          # Commit and Push back to the repository
          git add my-python-chart/values.yaml
          git commit -m "chore(cd): update image tag to ${{ github.sha }} [skip ci]"
          git push
