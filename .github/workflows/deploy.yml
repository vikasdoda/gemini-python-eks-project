name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: THE QUALITY GATE
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx fastapi 
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Tests
      run: |
        python -m pytest

  # JOB 2: THE PRODUCTION BUILD
  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-tests  # <--- CRITICAL: This job only starts if unit-tests PASSES
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-python-app
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  # JOB 3: THE AUTOMATED DEPLOYMENT
  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: build-and-push # <--- Wait for the image to be ready in ECR
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

        # --- ADD THIS SECTION START ---
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Set Kubernetes Context
      run: |
        # This command takes the long Base64 string from GitHub Secrets,
        # decodes it back into a file, and puts it where 'kubectl' can find it.
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        # Step C: The "Expert" Fix
        # This tells the kubeconfig to use the 'aws' command directly
        # without looking for specific local profiles.
        aws eks update-kubeconfig --region eu-central-1 --name devops-expert-cluster

    - name: Deploy to EKS
      run: |
        # We use Helm to upgrade the existing release.
        # --install means "if it's not there, create it."
        # --set image.tag=latest ensures we pull the brand new image we just pushed.
        helm upgrade --install my-python-app ./my-python-chart \
          --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/my-python-app \
          --set image.tag=${{ github.sha }}
